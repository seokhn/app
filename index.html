<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニアキネーター</title>
<style>
body{
    font-family: sans-serif;
    background:#f5f1e6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:320px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    color:#7b5e57;
}

#question{
    margin:20px 0;
    font-size:18px;
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.yes{
    background:#8ecae6;
}

.no{
    background:#ffb4a2;
}

#result{
    font-size:20px;
    margin-top:20px;
}

.restart{
    margin-top:15px;
    background:#cdb4db;
}
</style>
</head>
<body>

<div class="container">
<h1>ミニアキネーター</h1>

<div id="question"></div>

<div id="buttons">
<button class="yes" onclick="answer(true)">はい</button>
<button class="no" onclick="answer(false)">いいえ</button>
</div>

<div id="result"></div>
<button class="restart" onclick="restart()" style="display:none;">もう一回</button>

</div>

<script>

const characters = [
{
name:"ピカチュウ",
answers:[true,true,false]
},
{
name:"ドラえもん",
answers:[false,true,true]
},
{
name:"マリオ",
answers:false,true,false
},
{
name:"スヌーピー",
answers:[false,false,true]
}
];

const questions=[
"そのキャラクターはゲームに出てきますか？",
"そのキャラクターは黄色ですか？",
"そのキャラクターはロボットですか？"
];

let step=0;
let candidates=[...characters];

const questionEl=document.getElementById("question");
const resultEl=document.getElementById("result");
const buttons=document.getElementById("buttons");

showQuestion();

function showQuestion(){
if(step<questions.length){
questionEl.textContent=questions[step];
}else{
guess();
}
}

function answer(value){

candidates=candidates.filter(c=>{
if(!Array.isArray(c.answers)) return false;
return c.answers[step]===value;
});

step++;
showQuestion();
}

function guess(){

buttons.style.display="none";

if(candidates.length>0){
resultEl.textContent="あなたが考えたのは「"+candidates[0].name+"」ですね！";
}else{
resultEl.textContent="わかりませんでした…";
}

document.querySelector(".restart").style.display="inline-block";
}

function restart(){
location.reload();
}

</script>

</body>
</html>
