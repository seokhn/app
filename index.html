<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ハムスター育成ゲーム</title>

<style>
body{
    font-family:sans-serif;
    background:#f5efe6;
    text-align:center;
}

h1{
    color:#6b4f3a;
}

#game{
    background:white;
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

#hamster{
    font-size:80px;
}

.status{
    margin:10px 0;
    text-align:left;
}

.bar{
    height:15px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:50%;
    background:#ffb347;
}

button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#f7c59f;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    background:#f4a261;
}

#message{
    margin-top:10px;
    color:#444;
}
</style>
</head>

<body>

<h1>🐹 ハムスター育成ゲーム</h1>

<div id="game">

<div id="hamster">🐹</div>

<div class="status">
おなか
<div class="bar"><div id="hunger" class="fill"></div></div>
</div>

<div class="status">
元気
<div class="bar"><div id="energy" class="fill"></div></div>
</div>

<div class="status">
幸せ
<div class="bar"><div id="happy" class="fill"></div></div>
</div>

<button onclick="feed()">ごはん</button>
<button onclick="play()">あそぶ</button>
<button onclick="sleep()">ねる</button>

<div id="message">ハムスターを育てよう！</div>

</div>

<script>

let hunger = 70
let energy = 70
let happy = 70

function update(){

document.getElementById("hunger").style.width = hunger + "%"
document.getElementById("energy").style.width = energy + "%"
document.getElementById("happy").style.width = happy + "%"

if(hunger<=0 || energy<=0 || happy<=0){
document.getElementById("message").textContent="ハムスターが元気じゃない…！世話してあげて！"
}

}

function feed(){
hunger = Math.min(100, hunger+20)
energy = Math.max(0, energy-5)
message("ハムスターはごはんを食べた！")
update()
}

function play(){
happy = Math.min(100, happy+20)
energy = Math.max(0, energy-10)
hunger = Math.max(0, hunger-5)
message("ハムスターと遊んだ！")
update()
}

function sleep(){
energy = Math.min(100, energy+25)
hunger = Math.max(0, hunger-10)
message("ハムスターはぐっすり寝た！")
update()
}

function message(text){
document.getElementById("message").textContent=text
}

setInterval(()=>{
hunger = Math.max(0, hunger-1)
energy = Math.max(0, energy-1)
happy = Math.max(0, happy-1)
update()
},4000)

update()

</script>

</body>
</html>
